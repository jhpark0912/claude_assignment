name: Auto Grade Assignment

# 과제 PR이 열리거나 갱신되면 자동 채점 → PR에 한국어 댓글.
# @claude 멘션으로 재채점/질문도 가능.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths: ['[0-9][0-9].*//**']
  issue_comment:
    types: [created]

# fork PR에서는 시크릿이 막혀 채점이 안 됩니다(본인 레포 단독 사용 전제).
jobs:
  grade:
    # PR 이벤트이거나, PR 댓글에 @claude 멘션이 있을 때만 실행
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout (전체 히스토리 - diff/커밋 채점용)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21 (빌드·테스트 실행용)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Claude 채점
        uses: anthropics/claude-code-action@v1
        with:
          # GitHub App 설치 완료 — 인증은 자동 처리됨
          prompt: "/grade"
          claude_args: |
            --model claude-opus-4-6
            --max-turns 50
            --allowedTools Read,Glob,Grep,Bash
        # 비용을 줄이려면 모델을 --model claude-sonnet-4-6 으로 교체하세요.
        # 채점 정확도(특히 동시성·정책 판단)는 opus가 더 안정적입니다.
